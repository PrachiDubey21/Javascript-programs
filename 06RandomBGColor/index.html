<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Color Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
  class="min-h-screen transition-colors duration-500">

  <!-- Main Section -->
  <div class="flex items-center justify-center min-h-[85vh] px-4">

    <div
      class="bg-white/30 backdrop-blur-lg shadow-2xl rounded-3xl p-10 max-w-2xl w-full text-center border border-white/50"
    >

      <h1 class="text-4xl font-bold text-gray-900 mb-4">
         Random Color Generator
      </h1>

      <p class="text-gray-700 text-lg mb-10">
        Click Start to change the background color every second.
      </p>

      <div class="flex justify-center gap-6">

        <button
          id="start"
          class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-8 py-3 rounded-xl shadow-lg transition duration-300 hover:scale-105"
        >
          Start
        </button>

        <button
          id="stop"
          class="bg-rose-500 hover:bg-rose-600 text-white font-semibold px-8 py-3 rounded-xl shadow-lg transition duration-300 hover:scale-105"
        >
          Stop
        </button>

      </div>

      <div class="mt-10">
        <p class="text-gray-700 text-sm">
          Watch the page transform into random colors every second!
        </p>
      </div>

    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
