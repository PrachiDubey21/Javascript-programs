<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Color Switcher</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#f5f5f5] transition-all duration-500">
    
    <div class="min-h-screen flex items-center justify-center px-4">
      
      <div class="bg-white shadow-2xl rounded-3xl p-10 text-center max-w-2xl w-full">
        
        <h1 class="text-4xl font-bold text-gray-800 mb-10">
           Color Switcher
        </h1>

        <!-- Color Buttons -->
        <div class="flex flex-wrap justify-center gap-5 mb-10">

          <span
            class="button w-16 h-16 rounded-full bg-pink-200 cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="pink"
          ></span>

          <span
            class="button w-16 h-16 rounded-full bg-purple-200 cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="purple"
          ></span>

          <span
            class="button w-16 h-16 rounded-full bg-[#F5F5DC] cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="beige"
          ></span>

          <span
            class="button w-16 h-16 rounded-full bg-yellow-200 cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="yellow"
          ></span>

          <span
            class="button w-16 h-16 rounded-full bg-blue-200 cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="blue"
          ></span>

          <span
            class="button w-16 h-16 rounded-full bg-green-200 cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="green"
          ></span>

          <span
            class="button w-16 h-16 rounded-full bg-[#D2B48C] cursor-pointer border-4 border-white shadow-lg hover:scale-110 transition"
            id="brown"
          ></span>

        </div>

        <h2 class="text-xl text-gray-700 font-medium leading-relaxed">
          Click a color to change the background
        </h2>

      </div>

    </div>

    <script src="index.js"></script>
  </body>
</html>
