<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetMetric</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <!-- heading
        user data
        stats data -->

      <h1>LeetMetric</h1>

      <div class="user-container">
        <p>Enter your Username below :</p>
        <div class="user-input-container">
          <input
            type="text"
            placeholder="Enter your Username here :"
            id="user-input"
          />
          <button id="search-button">Search</button>
        </div>
      </div>

      <div class="stats-container">
        <div class="loading-text" style="display: none">Data is loading...</div>
        <div class="progress">
          <div class="progress-item">
            <div class="easy-progress circle">
              <span id="easy-label">
                <p>EASY</p>
              </span>
            </div>
          </div>

          <div class="progress-item">
            <div class="Medium-progress circle">
              <span id="Medium-label">
                <p>MEDIUM</p>
              </span>
            </div>
          </div>

          <div class="progress-item">
            <div class="Hard-progress circle">
              <span id="Hard-label">
                <p>HARD</p>
              </span>
            </div>
          </div>
        </div>

        <div class="stats-card">
          <!-- directly populated by the js code -->
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
