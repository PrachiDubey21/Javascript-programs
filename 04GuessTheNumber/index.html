<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-[#FFFFF0]
 via-[#F8F8F8] to-[#C0C0C0]">

    <!-- Main Card -->
    <div class="flex items-center justify-center min-h-[85vh] px-4">

        <div
            id="wrapper"
            class="bg-[#FFFFF0] shadow-2xl rounded-3xl
             p-10 max-w-xl w-full text-center border border-gray-300" >

            <h1 class="text-4xl font-bold text-gray-800 mb-6">
                Number Guessing Game
            </h1>

            <p class="text-gray-600 mb-2">
                Try and guess a random number between 1 and 100.
            </p>

            <p class="text-gray-600 mb-8">
                You have 10 attempts to guess the right number.
            </p>

            <!-- Form -->
            <form class="form flex flex-col items-center gap-5">

                <label
                    for="guessField"
                    id="guess"
                    class="text-2xl font-semibold text-gray-700">

                    Guess a Number

                </label>

                <input
                    type="text"
                    id="guessField"
                    class="guessField w-full px-4 py-3 border 
                    border-gray-300 rounded-xl focus:outline-none 
                    focus:ring-2 focus:ring-gray-400"
                    placeholder="Enter a number">

                <input
                    type="submit"
                    id="subt"
                    value="Submit Guess"
                    class="guessSubmit bg-[#C0C0C0] 
                    hover:bg-[#A8A8A8] text-gray-800 
                    font-semibold px-8 py-3 rounded-xl 
                    cursor-pointer transition duration-300 hover:scale-105">

            </form>

            <!-- Results -->
            <div class="resultParas mt-8 space-y-3">

                <p class="text-gray-700">
                    Previous Guesses:
                    <span class="guesses font-semibold"></span>
                </p>

                <p class="text-gray-700">
                    Guesses Remaining:
                    <span class="lastResult font-bold">10</span>
                </p>

                <p
                    class="lowOrHi text-lg font-semibold text-gray-800"
                ></p>

            </div>

        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
