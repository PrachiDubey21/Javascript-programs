<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-[#F8F5F0] 
via-[#F5F5F0] to-[#E8F0E3]">


  <!-- Clock Section -->
  <div class="flex flex-col items-center justify-center h-[85vh]">

    <div
      id="banner"
      class="text-3xl font-bold text-[#5F7161] mb-8">

      Your Local Time
    </div>

    <div
      id="clock"
      class="bg-[#5F7161] text-[#F8F5F0] text-6xl 
      font-mono px-12 py-6 rounded-2xl shadow-2xl tracking-widest"
    ></div>

  </div>

  <script src="index.js"></script>

</body>
</html>
